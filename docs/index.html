<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCodeGarden 🌱</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header>
    <nav>
        <ul>
            <li><a href="https://github.com/GreenBandYt">GreenBandYt</a></li>
            <li><a href="#">Главная</a></li>
            <li><a href="#">Аллеи</a></li>
            <li><a href="#">Родник знаний</a></li>
            <li><a href="#">Тропинки</a></li>
            <li><a href="https://greenbandyt.github.io/UnexpectedGardener-Site/">Грядки на водорослях</a></li>
        </ul>
    </nav>
</header>

<!-- БЛОК С README (теперь внутри README есть раздел о книге) -->
<section id="readme">
    <div id="readme-content"></div>
</section>

<footer>
    <p>© 2025 GreenBandYt | <a href="https://github.com/GreenBandYt">GitHub</a> | <a href="https://zerocoder.ru/">Zerocoder</a></p>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const readmeContainer = document.getElementById("readme-content");
        fetch("https://raw.githubusercontent.com/GreenBandYt/GreenCodeGarden/main/README.md")
            .then(response => response.text())
            .then(text => {
                readmeContainer.innerHTML = marked.parse(text);
            })
            .catch(error => {
                console.error("Ошибка загрузки README:", error);
                readmeContainer.innerHTML = "<p>❌ Не удалось загрузить README.</p>";
            });
    });
</script>

</body>
</html>
